services:
  eureka-server:
    image: aleksam02/eureka-server:0.1
    mem_limit: 700m
    ports: 
      - "8761:8761"
    networks:
      - "nurdor-network"

  config-server:
    image: aleksam02/config-server:0.1
    mem_limit: 700m
    ports: 
      - "8888:8888"
    networks:
      - "nurdor-network"
    environment:
    - spring.cloud.config.server.git.uri=https://github.com/LX002/config-repo
    - spring.cloud.config.server.git.default-label=master

  auth-service:
    image: aleksam02/auth-service:0.1
    mem_limit: 700m
    ports: 
      - "8080:8080"
    depends_on:
     - eureka-server
     - config-server
    networks:
      - "nurdor-network"
    environment:
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
      - jwt.secret="fXbLNILaaIZPrVbtLFpiamwPM+rXpeYmZeIR1G6sA3g="
      - spring.cloud.config.uri=http://config-server:8888

  donations-service:
